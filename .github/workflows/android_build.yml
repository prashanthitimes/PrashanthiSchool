name: Build Signed Android AAB

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: Create Web Assets
        run: mkdir -p out && touch out/index.html

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Generate Assets (Icons)
        run: npx @capacitor/assets generate --android --assetPath public --iconBackgroundColor "#FFFFFF"

      - name: Build AAB
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease

      - name: Create Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_CONTENT }}" | base64 -d > android/app/release.keystore

      - name: Build Signed AAB
        env:
          # Explicitly point to the location where we will save the file
          KEYSTORE_PATH: release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          # Create the directory just in case, and save the keystore
          # Ensure it is placed exactly in the 'android/app/' directory
          echo "${{ secrets.ANDROID_KEYSTORE_CONTENT }}" | base64 -d > android/app/release.keystore
          
          # Verify the file exists before running Gradle
          ls -l android/app/release.keystore
          
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease

      - name: Upload Signed AAB
        uses: actions/upload-artifact@v4
        with:
          name: Signed_Prashanthi_AAB
          path: android/app/build/outputs/bundle/release/app-release.aab