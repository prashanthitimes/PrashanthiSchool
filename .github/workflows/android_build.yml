name: Build Signed Android AAB

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: Create Web Assets
        run: mkdir -p out && touch out/index.html

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Generate Assets (Icons)
        run: npx @capacitor/assets generate --android --assetPath public

      - name: Build AAB
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease

      - name: Create and Sign AAB
        run: |
          # 1. Create a fresh keystore inside the GitHub runner
          keytool -genkey -v -keystore release.keystore -alias school-alias -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            -dname "CN=Prashanthi School, OU=Education, O=School, L=Bangalore, S=Karnataka, C=IN"

          # 2. Sign the AAB file
          jarsigner -keystore release.keystore \
            -storepass "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            android/app/build/outputs/bundle/release/app-release.aab school-alias

      - name: Upload Signed AAB
        uses: actions/upload-artifact@v4
        with:
          name: Signed_Prashanthi_AAB
          path: android/app/build/outputs/bundle/release/app-release.aab