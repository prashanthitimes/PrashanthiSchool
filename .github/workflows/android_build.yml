name: Build Signed Android AAB

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: Create Web Assets
        run: mkdir -p out && touch out/index.html

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Generate Assets (Icons)
        run: npx @capacitor/assets generate --android --assetPath public

      - name: Extract Google Play Public Certificate (.PEM)
        run: |
          # 1. Decode the binary keystore file safely
          echo "${{ secrets.ANDROID_KEYSTORE_CONTENT }}" | tr -d '[:space:]' | base64 -d > release.keystore

          # 2. Extract the true public PEM certificate Google requires
          keytool -export -rfc \
            -keystore release.keystore \
            -alias "${{ secrets.ANDROID_KEY_ALIAS }}" \
            -storepass "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            -file google_play_ready.pem

          echo ""
          echo "=========================================================================="
          echo "👇 COPY EVERYTHING BETWEEN AND INCLUDING THE DASHED LINES BELOW FOR GOOGLE 👇"
          echo "=========================================================================="
          cat google_play_ready.pem
          echo "=========================================================================="

      - name: Build AAB
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease

      - name: Extract and Sign AAB
        run: |
          # Re-verify keystore binary exists for signing step
          echo "${{ secrets.ANDROID_KEYSTORE_CONTENT }}" | tr -d '[:space:]' | base64 -d > release.keystore

          # Sign the compiled AAB using jarsigner
          jarsigner -keystore release.keystore \
            -storepass "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.ANDROID_KEY_PASSWORD }}" \
            android/app/build/outputs/bundle/release/app-release.aab \
            "${{ secrets.ANDROID_KEY_ALIAS }}"

      - name: Upload Signed AAB
        uses: actions/upload-artifact@v4
        with:
          name: Signed_Prashanthi_AAB
          path: android/app/build/outputs/bundle/release/app-release.aab